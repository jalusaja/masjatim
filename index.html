*{box-sizing:border-box;margin:0;padding:0}
:root{--t:#1B3A6B;--t2:#2563EB;--tl:#DBEAFE;--t3:#0F2149;--bl:#E6F1FB;--rl:#FCEBEB;--gl:#EAF3DE;--al:#FAEEDA;--bg:#F4F5F0;--sur:#fff;--brd:#e2e2da;--txt:#1a1a1a;--txt2:#6b;--r:10px;--rs:6px}
body{font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;background:var(--bg);color:var(--txt);min-height:100vh}
.flex{display:flex}.fc{flex-direction:column}.f1{flex:1}.oh{overflow:hidden}.oy{overflow-y:auto}
.card{background:var(--sur);border:1px solid var(--brd);border-radius:var(--r);padding:14px;margin-bottom:10px}
.stat-box{background:#f7f7f3;border-radius:var(--rs);padding:10px 12px}
.stat-lbl{font-size:10px;color:#666;margin-bottom:3px}.stat-val{font-size:16px;font-weight:600}

/* ── FIREBASE MANAGER ── */
const DB_PATH = 'mas-koperasi/data';
let fbApp = null,
  fbDb = null,
  fbListener = null;
function initFirebase(cfg, onData, onStatus) {
  try {
    if (fbListener && fbDb) {
      fbDb.ref(DB_PATH).off('value', fbListener);
      fbListener = null;
    }
    if (fbApp) {
      try {
        fbApp.delete();
      } catch (e) {}
    }
    onStatus('connecting');
    fbApp = firebase.initializeApp(cfg, 'mas-app-' + Date.now());
    fbDb = fbApp.database();
    fbListener = fbDb.ref(DB_PATH).on('value', snap => {
      const val = snap.val();
      if (val) {
        onData(val);
      } else {
        const init = initData();
        fbDb.ref(DB_PATH).set(init);
        onData(init);
      }
      onStatus('connected');
    }, err => {
      console.error('Firebase error:', err);
      onStatus('error');
    });
  } catch (e) {
    console.error('Firebase init error:', e);
    onStatus('error');
  }
}
function writeToFirebase(newData) {
  if (fbDb) fbDb.ref(DB_PATH).set(newData);
}
function disconnectFirebase() {
  if (fbListener && fbDb) {
    fbDb.ref(DB_PATH).off('value', fbListener);
    fbListener = null;
  }
  if (fbApp) {
    try {
      fbApp.delete();
    } catch (e) {}
  }
  fbApp = null;
  fbDb = null;
}
