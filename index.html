<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--t:#1B3A6B;--t2:#2563EB;--tl:#DBEAFE;--t3:#0F2149;--bl:#E6F1FB;--rl:#FCEBEB;--gl:#EAF3DE;--al:#FAEEDA;--bg:#F4F5F0;--sur:#fff;--brd:#e2e2da;--txt:#1a1a1a;--txt2:#6b;--r:10px;--rs:6px}
body{font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;background:var(--bg);color:var(--txt);min-height:100vh}
.flex{display:flex}.fc{flex-direction:column}.f1{flex:1}.oh{overflow:hidden}.oy{overflow-y:auto}
.card{background:var(--sur);border:1px solid var(--brd);border-radius:var(--r);padding:14px;margin-bottom:10px}
.stat-box{background:#f7f7f3;border-radius:var(--rs);padding:10px 12px}
.stat-lbl{font-size:10px;color:#666;margin-bottom:3px}.stat-val{font-size:16px;font-weight:600}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:var(--rs);border:1px solid var(--brd);cursor:pointer;font-size:12px;background:var(--sur);color:var(--txt);transition:background .12s;font-family:inherit;line-height:1}
.btn:hover{background:#f0f0eb}
.btn-p{background:var(--t);color:#fff;border-color:var(--t)}.btn-p:hover{background:var(--t2)}
.btn-grn{background:var(--gl);color:#3B6D11;border-color:#b6d98a}
.btn-blu{background:var(--bl);color:#185FA5;border-color:#93C5FD}
.btn-pur{background:#F0EBF8;color:#5B21B6;border-color:#C4B0E8}
.btn-red{background:var(--rl);color:#A32D2D;border-color:#F0B8B8}
.btn-ora{background:#FEF3E2;color:#92400E;border-color:#FCD19B}
.btn-xs{padding:3px 8px;font-size:11px}.btn-sm{padding:5px 10px;font-size:12px}
.inp{width:100%;padding:7px 10px;border:1px solid var(--brd);border-radius:var(--rs);font-size:12px;background:var(--sur);color:var(--txt);outline:none}
.inp:focus{border-color:var(--t2)}
.inp-mono{font-family:monospace;font-size:11px}
.sel{width:100%;padding:7px 10px;border:1px solid var(--brd);border-radius:var(--rs);font-size:12px;background:var(--sur);color:var(--txt);outline:none}
.ta{width:100%;padding:8px 10px;border:1px solid var(--brd);border-radius:var(--rs);font-size:11px;font-family:monospace;background:#fafaf8;color:var(--txt);outline:none;resize:vertical}
.ta:focus{border-color:var(--t2)}
.fg{display:flex;flex-direction:column;gap:3px;margin-bottom:8px}
.fg>label{font-size:10px;color:#666;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.bdg{display:inline-block;font-size:10px;padding:2px 8px;border-radius:99px;font-weight:600}
.bg{background:var(--gl);color:#3B6D11}.bb{background:var(--bl);color:#185FA5}.br{background:var(--rl);color:#A32D2D}.ba{background:var(--al);color:#BA7517}.bt{background:var(--tl);color:var(--t)}
table{width:100%;border-collapse:collapse}
thead th{font-size:10px;font-weight:700;color:#666;padding:6px 8px;border-bottom:2px solid var(--brd);text-align:left;white-space:nowrap;text-transform:uppercase;letter-spacing:.3px}
tbody td{font-size:12px;padding:7px 8px;border-bottom:1px solid var(--brd);color:var(--txt);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#f7f7f3}
.tag{font-size:10px;background:#f0f0ea;color:#888;padding:2px 6px;border-radius:4px;font-family:monospace}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:500}
.modal-box{background:var(--sur);border-radius:var(--r);width:480px;max-height:92vh;overflow-y:auto;box-shadow:0 12px 40px rgba(0,0,0,0.15)}
.modal-wide{width:680px}
.modal-head{padding:14px 18px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between;font-size:14px;font-weight:600;position:sticky;top:0;background:var(--sur);z-index:1}
.modal-body{padding:16px 18px}
.modal-foot{padding:12px 18px;border-top:1px solid var(--brd);display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:var(--sur)}
.ir{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--brd);font-size:12px}
.ir:last-child{border-bottom:none}.ir-lbl{color:#666}
.pbar{background:#ebebeb;border-radius:99px;height:5px}
.pfill{background:var(--t2);height:5px;border-radius:99px;transition:width .3s}
.bell-wrap{position:relative}
.notif-panel{position:absolute;right:0;top:calc(100% + 8px);width:300px;background:var(--sur);border:1px solid var(--brd);border-radius:var(--r);z-index:400;box-shadow:0 4px 20px rgba(0,0,0,0.12);overflow:hidden}
.np-head{padding:10px 14px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between;font-size:12px;font-weight:600}
.ni{display:flex;gap:10px;padding:10px 14px;border-bottom:1px solid var(--brd);cursor:pointer}.ni:hover{background:#f7f7f3}.ni:last-child{border-bottom:none}.ni.unread{background:#f9fdf9}
.ni-ic{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px}
.ic-warn{background:var(--al);color:#BA7517}.ic-succ{background:var(--gl);color:#3B6D11}.ic-info{background:var(--bl);color:#185FA5}.ic-dang{background:var(--rl);color:#A32D2D}
/* Login & Setup */
.center-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg);padding:16px}
.login-card{background:var(--sur);border:1px solid var(--brd);border-radius:var(--r);padding:28px;width:360px;box-shadow:0 4px 24px rgba(0,0,0,0.07)}
.setup-card{background:var(--sur);border:1px solid var(--brd);border-radius:var(--r);padding:0;width:560px;box-shadow:0 4px 24px rgba(0,0,0,0.07);overflow:hidden}
.tab-bar{display:flex;background:#f0f0ea;border-radius:var(--rs);padding:3px;margin-bottom:16px;gap:2px}
.tb{flex:1;padding:7px;text-align:center;border-radius:4px;font-size:12px;cursor:pointer;color:#666;border:none;background:transparent;font-family:inherit;transition:all .12s}
.tb.on{background:var(--sur);color:var(--txt);font-weight:600;border:1px solid var(--brd)}
.pin-dot{width:11px;height:11px;border-radius:50%;background:#ddd;display:inline-block;margin:0 3px;transition:background .1s}
.pin-dot.filled{background:var(--t3)}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:10px}
.pin-key{padding:11px;text-align:center;border:1px solid var(--brd);border-radius:var(--rs);cursor:pointer;font-size:16px;font-weight:500;background:var(--sur);font-family:inherit}
.pin-key:hover{background:#f0f0ea}
/* Setup wizard */
.setup-header{background:var(--t3);padding:20px 24px;color:#fff}
.setup-body{padding:20px 24px}
.step-wrap{display:flex;gap:0;margin-bottom:20px;border-bottom:2px solid var(--brd)}
.sw{flex:1;padding:10px 8px;text-align:center;font-size:11px;cursor:pointer;color:#888;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .12s}
.sw.on{color:var(--t);border-bottom-color:var(--t);font-weight:600}
.sw-num{width:20px;height:20px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;margin-bottom:4px;background:#f0f0ea;color:#888;display:block;margin:0 auto 4px}
.sw.on .sw-num{background:var(--t);color:#fff}
.sw.done .sw-num{background:var(--t2);color:#fff}
.guide-step{background:#f7f7f3;border-radius:var(--rs);padding:12px;margin-bottom:10px;border-left:3px solid var(--t2)}
.code-box{background:#1e1e1e;color:#d4d4d4;border-radius:var(--rs);padding:12px;font-family:monospace;font-size:11px;margin:8px 0;white-space:pre;overflow-x:auto;position:relative}
.copy-btn{position:absolute;top:8px;right:8px;background:rgba(255,255,255,0.1);border:none;color:#fff;padding:3px 8px;border-radius:4px;font-size:10px;cursor:pointer;font-family:inherit}
.copy-btn:hover{background:rgba(255,255,255,0.2)}
/* Admin sidebar */
.sidebar{width:172px;background:var(--t3);flex-shrink:0;display:flex;flex-direction:column}
.s-logo{padding:16px 14px;border-bottom:1px solid rgba(255,255,255,0.1)}
.s-brand{font-size:15px;font-weight:700;color:#fff}
.s-sub{font-size:10px;color:rgba(255,255,255,.45);margin-top:2px}
.nav-it{display:flex;align-items:center;gap:8px;padding:9px 14px;cursor:pointer;color:rgba(255,255,255,.6);font-size:12px;border-left:3px solid transparent;transition:all .12s}
.nav-it:hover{background:rgba(255,255,255,.07);color:#fff}
.nav-it.on{background:rgba(255,255,255,.12);color:#fff;border-left-color:var(--t2)}
.topbar{background:var(--sur);padding:10px 18px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.content-area{flex:1;overflow-y:auto;padding:16px;position:relative}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:10px}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.tw{overflow-x:auto}
/* Member */
.m-app{display:flex;flex-direction:column;height:100vh}
.m-top{background:var(--t3);color:#fff;padding:12px 16px;flex-shrink:0}
.m-nav{display:flex;background:var(--sur);border-bottom:1px solid var(--brd);flex-shrink:0}

/* ── FIREBASE MANAGER ── */
const DB_PATH='mas-koperasi/data';
let fbApp=null, fbDb=null, fbListener=null;

function initFirebase(cfg,onData,onStatus) {
  try {
    if(fbListener&&fbDb){fbDb.ref(DB_PATH).off('value',fbListener);fbListener=null;}
    if(fbApp){try{fbApp.delete();}catch(e){}}
    onStatus('connecting');
    fbApp=firebase.initializeApp(cfg,'mas-app-'+Date.now());
    fbDb=fbApp.database();
    fbListener=fbDb.ref(DB_PATH).on('value',snap=>{
      const val=snap.val();
      if(val){onData(val);}
      else{const init=initData();fbDb.ref(DB_PATH).set(init);onData(init);}
      onStatus('connected');
    },err=>{console.error('Firebase error:',err);onStatus('error');});
  } catch(e) {
    console.error('Firebase init error:',e);
    onStatus('error');
  }
}
function writeToFirebase(newData) {
  if(fbDb)fbDb.ref(DB_PATH).set(newData);
}
function disconnectFirebase() {
  if(fbListener&&fbDb){fbDb.ref(DB_PATH).off('value',fbListener);fbListener=null;}
  if(fbApp){try{fbApp.delete();}catch(e){}}
  fbApp=null;fbDb=null;
}

  window.XLSX.utils.book_append_sheet(wb,ws,'Template');

}

  const now=new Date(TODAY);
  data.simpanan.filter(s=>s.jt).forEach(s=>{const diff=Math.round((new Date(s.jt)-now)/86400000);if(diff>=0&&diff<=14)n.push({id:'ns'+s.id,type:'warn',icon:'ti-calendar-exclamation',msg:`Simpanan ${s.jenis} ${gN(s.aid)} jatuh tempo ${diff} hari lagi`,sub:fmtD(s.jt)});});
  n.push({id:'ni',type:'succ',icon:'ti-users',msg:`${data.anggota.filter(a=>a.status==='Aktif').length} anggota aktif`,sub:`Per ${fmtD(TODAY)}`});
  return n;
}
function getMemberNotifs(data,aid){
  const n=[];
  data.pinjaman.filter(p=>p.aid===aid).forEach(p=>{
    if(p.status==='Aktif')n.push({id:'mp'+p.id,type:'warn',icon:'ti-receipt',msg:`Cicilan ${p.id} menunggu pembayaran`,sub:fmt(p.cicilan)+'/bln'});
    if(p.status==='Menunggu')n.push({id:'mw'+p.id,type:'info',icon:'ti-clock',msg:`Pengajuan ${p.id} menunggu persetujuan`,sub:fmt(p.jumlah)});
    if(p.status==='Lunas')n.push({id:'ml'+p.id,type:'succ',icon:'ti-circle-check',msg:`Pinjaman ${p.id} lunas`,sub:'Selamat!'});
  });
  data.transaksi.filter(t=>t.aid===aid).slice(0,3).forEach(t=>n.push({id:'mt'+t.id,type:'succ',icon:t.tipe==='K'?'ti-arrow-down-circle':'ti-arrow-up-circle',msg:`${t.jenis} berhasil`,sub:(t.tipe==='K'?'+':'-')+fmt(t.nom)}));
  return n;
}

function ImportModal({show,onClose,data,upd}){
  const [tab,setTab]=useState('anggota'),[step,setStep]=useState(1),[rows,setRows]=useState([]),[headers,setHeaders]=useState([]),[result,setResult]=useState(null),[drag,setDrag]=useState(false);
  const fileRef=useRef(),allRows=useRef([]);
  const reset=()=>{setStep(1);setRows([]);setHeaders([]);setResult(null);allRows.current=[]};
  const handleClose=()=>{reset();onClose()};
  const parseFile=file=>{
    if(!file||!window.XLSX)return;
    const r=new FileReader();
    r.onload=e=>{try{const wb=window.XLSX.read(e.target.result,{type:'binary',cellDates:true}),ws=wb.Sheets[wb.SheetNames[0]],parsed=window.XLSX.utils.sheet_to_json(ws,{defval:'',raw:false});if(parsed.length===0){alert('File kosong');return;}setHeaders(Object.keys(parsed[0]));setRows(parsed.slice(0,5));allRows.current=parsed;setStep(2);}catch(err){alert('Error: '+err.message);}};
    r.readAsBinaryString(file);
  };
  const g=(r,...ks)=>ks.map(k=>r[k]||r[k.toLowerCase()]||r[k.toUpperCase()]||'').find(v=>v!=='')||'';
  const doImport=()=>{
    const rows=allRows.current;if(!rows.length)return;
    let count=0,errs=[];
    try{
      if(tab==='anggota'){const imp=rows.map((r,i)=>{const nama=g(r,'Nama','name');if(!nama){errs.push(`Baris ${i+2}: Nama kosong`);return null;}return{id:newId('A',[...data.anggota,...Array(i).fill({})]),nama,nik:String(g(r,'NIK','nik')),phone:String(g(r,'Telepon','telepon','HP')),alamat:g(r,'Alamat','alamat'),bergabung:g(r,'Bergabung','bergabung')||TODAY,status:g(r,'Status','status')||'Aktif'};}).filter(Boolean);upd('anggota',[...data.anggota,...imp]);count=imp.length;}
      else if(tab==='simpanan'){const imp=rows.map((r,i)=>{const aid=g(r,'ID Anggota','aid','id_anggota');if(!aid){errs.push(`Baris ${i+2}: ID Anggota kosong`);return null;}return{id:newId('S',[...data.simpanan,...Array(i).fill({})]),aid,jenis:g(r,'Jenis','jenis')||'Wadiah',saldo:parseFloat(String(g(r,'Saldo','saldo')).replace(/[^0-9.]/g,''))||0,bh:parseFloat(g(r,'Bagi Hasil %','bh'))||0,tgl:g(r,'Tgl Buka','tgl_buka','tgl')||TODAY,jt:g(r,'Jatuh Tempo','jt')||null};}).filter(Boolean);upd('simpanan',[...data.simpanan,...imp]);count=imp.length;}
      else if(tab==='pinjaman'){const imp=rows.map((r,i)=>{const aid=g(r,'ID Anggota','aid');const j=parseFloat(String(g(r,'Jumlah','jumlah')).replace(/[^0-9.]/g,''))||0;if(!aid||!j){errs.push(`Baris ${i+2}: data tidak lengkap`);return null;}const t=parseInt(g(r,'Tenor (bulan)','tenor'))||12;return{id:newId('P',[...data.pinjaman,...Array(i).fill({})]),aid,jumlah:j,sisa:j,cicilan:Math.round(j/t),bunga:parseFloat(g(r,'Bunga %/bln','bunga'))||1.5,tenor:t,ke:0,tgl:TODAY,status:'Menunggu'};}).filter(Boolean);upd('pinjaman',[...data.pinjaman,...imp]);count=imp.length;}
      else if(tab==='transaksi'){const imp=rows.map((r,i)=>{const aid=g(r,'ID Anggota','aid');const nom=parseFloat(String(g(r,'Nominal','nominal')).replace(/[^0-9.]/g,''))||0;if(!aid||!nom){errs.push(`Baris ${i+2}: data tidak lengkap`);return null;}return{id:newId('T',[...data.transaksi,...Array(i).fill({})]),tgl:g(r,'Tanggal','tgl')||TODAY,aid,jenis:g(r,'Jenis','jenis')||'Lainnya',ket:g(r,'Keterangan','ket'),nom,tipe:g(r,'Tipe (K/D)','tipe').toUpperCase()==='D'?'D':'K'};}).filter(Boolean);upd('transaksi',[...data.transaksi,...imp]);count=imp.length;}
      setResult({ok:true,count,errs});setStep(3);
    }catch(err){setResult({ok:false,msg:err.message});setStep(3);}
  };
  const tabs=[{id:'anggota',lbl:'Anggota',icon:'ti-users'},{id:'simpanan',lbl:'Simpanan',icon:'ti-piggy-bank'},{id:'pinjaman',lbl:'Pinjaman',icon:'ti-receipt'},{id:'transaksi',lbl:'Transaksi',icon:'ti-arrows-exchange'}];
  return <Modal show={show} onClose={handleClose} title="Import Data dari Excel / CSV" wide={true} onSave={step===2?doImport:null} saveLabel={`Import ${allRows.current.length} baris`}>
    <div className="step-indicator">
      {['Upload','Preview','Selesai'].map((s,i)=><React.Fragment key={i}>
        <div className={`step-dot ${step>i+1?'done':step===i+1?'active':'pending'}`}>{step>i+1?<i className="ti ti-check" style={{fontSize:11}}/>:i+1}</div>

        {i<2&&<div className={`step-line ${step>i+1?'done':''}`}/>}
      </React.Fragment>)}
    </div>
    {step===1&&<>
      <div className="import-tabs">{tabs.map(t=><button key={t.id} className={`it ${tab===t.id?'on':''}`} onClick={()=>{setTab(t.id);reset();}}><i className={`ti ${t.icon}`} style={{marginRight:4,fontSize:12}}/>{t.lbl}</button>)}</div>
      <div style={{background:'#f7f7f3',borderRadius:8,padding:'10px 12px',marginBottom:10,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div><div style={{fontSize:12,fontWeight:600}}>Belum punya template?</div><div style={{fontSize:11,color:'#666',marginTop:2}}>Download format Excel yang benar</div></div>
        <button className="btn btn-sm btn-grn" onClick={()=>downloadTemplate(tab)}><i className="ti ti-download"/> Template</button>
      </div>
      <div className={`drop-zone ${drag?'drag-over':''}`} onClick={()=>fileRef.current?.click()} onDragOver={e=>{e.preventDefault();setDrag(true)}} onDragLeave={()=>setDrag(false)} onDrop={e=>{e.preventDefault();setDrag(false);parseFile(e.dataTransfer.files[0])}}>
        <i className="ti ti-file-spreadsheet" style={{fontSize:36,color:'var(--t)',display:'block',marginBottom:8}}/>
        <div style={{fontSize:13,fontWeight:600,marginBottom:4}}>Klik atau drag & drop file</div>

      </div>
      <div style={{marginTop:10,padding:'10px 12px',background:'#f0f9f5',borderRadius:8,border:'1px solid var(--brd)'}}>
        <div style={{fontSize:11,fontWeight:600,marginBottom:5,color:'var(--t)'}}>Kolom yang dibutuhkan untuk {tab}:</div>
        <div style={{display:'flex',flexWrap:'wrap',gap:4}}>{TEMPLATES[tab].headers.map(h=><span key={h} style={{fontSize:10,background:'#fff',border:'1px solid var(--brd)',padding:'2px 8px',borderRadius:4}}>{h}</span>)}</div>
      </div>
    </>}
    {step===2&&<>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
        <div><div style={{fontSize:12,fontWeight:600}}>{allRows.current.length} baris ditemukan</div><div style={{fontSize:11,color:'#666'}}>Preview 5 baris pertama</div></div>
        <button className="btn btn-xs" onClick={reset}><i className="ti ti-refresh"/> Ganti File</button>
      </div>
      <div className="tw" style={{maxHeight:220,overflowY:'auto'}}>
        <table><thead><tr>{headers.map(h=><th key={h}>{h}</th>)}</tr></thead>
          <tbody>{rows.map((r,i)=><tr key={i}>{headers.map(h=><td key={h}>{String(r[h]).substring(0,25)}</td>)}</tr>)}</tbody>
        </table>
      </div>
      <div className="alert-box alert-teal" style={{marginTop:8}}><i className="ti ti-info-circle" style={{marginRight:4}}/>Data baru akan <strong>ditambahkan</strong> ke data yang sudah ada.</div>
    </>}
    {step===3&&result&&<>
      <div className={`result-box ${result.ok?'result-succ':'result-err'}`}>
        <i className={`ti ${result.ok?'ti-circle-check':'ti-circle-x'}`} style={{fontSize:36,display:'block',marginBottom:8}}/>
        <div style={{fontSize:14,fontWeight:700}}>{result.ok?`Berhasil! ${result.count} data diimport`:'Import Gagal'}</div>

      </div>
      {result.errs?.length>0&&<div style={{marginTop:10,padding:10,background:'#fff8f0',borderRadius:8,border:'1px solid #F0B8B8'}}>
        <div style={{fontSize:11,fontWeight:600,color:'#A32D2D',marginBottom:4}}>Baris dilewati ({result.errs.length}):</div>
        {result.errs.slice(0,5).map((e,i)=><div key={i} style={{fontSize:10,color:'#A32D2D'}}>• {e}</div>)}
      </div>}
      <div style={{display:'flex',gap:8,marginTop:12}}>
        <button className="btn btn-p btn-sm" style={{flex:1,justifyContent:'center'}} onClick={()=>{reset();setTab('anggota');}}>Import Lagi</button>

      </div>
    </>}
  </Modal>;
}

function FirebaseSetup({onConnect,onSkip}){

  const [error,setError]=useState('');
  const [connecting,setConnecting]=useState(false);
  const DB_RULES=`{\n  "rules": {\n    ".read": true,\n    ".write": true\n  }\n}`;
  const copyToClipboard=text=>{navigator.clipboard?.writeText(text).then(()=>alert('Disalin!'));};
  const tryConnect=()=>{
    setError('');setConnecting(true);
    try{
      let cfg;
      const cleaned=configText.trim().replace(/^const\s+firebaseConfig\s*=\s*/,'').replace(/;?\s*$/,'');
      try{cfg=JSON.parse(cleaned);}catch{try{cfg=eval('('+cleaned+')');}catch{throw new Error('Format config tidak valid. Pastikan berbentuk JSON');}}
      if(!cfg.apiKey||cfg.apiKey==='YOUR_API_KEY')throw new Error('apiKey tidak ditemukan');
      if(!cfg.databaseURL)throw new Error('databaseURL tidak ditemukan. Pastikan Realtime Database sudah diaktifkan');

      onConnect(cfg);

  };
  const steps=[
    {lbl:'Buat Project',icon:'ti-brand-firebase'},
    {lbl:'Aktifkan DB',icon:'ti-database'},

}

  const notifs=getAdminNotifs(data);
  const defAid=anggota.find(a=>a.status==='Aktif')?.id||'';

  const saveS=()=>{if(!fS.saldo)return;upd('simpanan',[...simpanan,{...fS,id:newId('S',simpanan),saldo:+fS.saldo,bh:+fS.bh,jt:fS.jt||null}]);upd('transaksi',[{id:newId('T',transaksi),tgl:TODAY,aid:fS.aid,jenis:'Setor Simpanan',ket:'Buka '+fS.jenis,nom:+fS.saldo,tipe:'K'},...transaksi]);setMS(false)};
  const saveP=()=>{if(!fP.jumlah)return;const j=+fP.jumlah,t=+fP.tenor;upd('pinjaman',[...pinjaman,{id:newId('P',pinjaman),aid:fP.aid,jumlah:j,sisa:j,cicilan:Math.round(j/t),bunga:+fP.bunga,tenor:t,ke:0,tgl:TODAY,status:'Menunggu'}]);setMP(false)};
  const approveP=(p,ok)=>{upd('pinjaman',pinjaman.map(x=>x.id===p.id?{...x,status:ok?'Aktif':'Ditolak',cicilan:ok?Math.round(p.jumlah/p.tenor):0}:x));if(ok)upd('transaksi',[{id:newId('T',transaksi),tgl:TODAY,aid:p.aid,jenis:'Pencairan',ket:'Cair '+p.id,nom:p.jumlah,tipe:'D'},...transaksi])};
  const bayarP=p=>{const sisa=Math.max(0,p.sisa-p.cicilan);upd('pinjaman',pinjaman.map(x=>x.id===p.id?{...x,sisa,ke:x.ke+1,status:sisa===0?'Lunas':'Aktif'}:x));upd('transaksi',[{id:newId('T',transaksi),tgl:TODAY,aid:p.aid,jenis:'Angsuran',ket:'Cicilan '+p.id,nom:p.cicilan,tipe:'K'},...transaksi])};
  const saveT=()=>{if(!fT.nom||!fT.ket)return;upd('transaksi',[{...fT,id:newId('T',transaksi),tgl:TODAY,nom:+fT.nom},...transaksi]);setMT(false)};

  const pages=[{id:'dashboard',icon:'ti-layout-dashboard',lbl:'Dashboard'},{id:'anggota',icon:'ti-users',lbl:'Anggota'},{id:'simpanan',icon:'ti-piggy-bank',lbl:'Simpanan'},{id:'pinjaman',icon:'ti-receipt',lbl:'Pinjaman'},{id:'transaksi',icon:'ti-arrows-exchange',lbl:'Transaksi'},{id:'laporan',icon:'ti-chart-bar',lbl:'Laporan'}];

function MemberApp({data,upd,memberId,onLogout,fbStatus}){
  const [pg,setPg]=useState('beranda'),[mSetor,setMSetor]=useState(false),[fSetor,setFSetor]=useState({sid:'',nom:'',jenis:'setor'}),[mAjukan,setMAjukan]=useState(false),[fAjukan,setFAjukan]=useState({jumlah:'',tenor:12}),[readIds,setReadIds]=useState([]);
  const {anggota,simpanan,pinjaman,transaksi}=data;
  const me=anggota.find(a=>a.id===memberId)||{};
  const mySmp=simpanan.filter(s=>s.aid===memberId),myPin=pinjaman.filter(p=>p.aid===memberId),myTx=transaksi.filter(t=>t.aid===memberId);
  const totSaldo=mySmp.reduce((s,x)=>s+x.saldo,0),notifs=getMemberNotifs(data,memberId);
  const doSetor=()=>{if(!fSetor.sid||!fSetor.nom)return;const n=+fSetor.nom;if(fSetor.jenis==='setor'){upd('simpanan',simpanan.map(s=>s.id===fSetor.sid?{...s,saldo:s.saldo+n}:s));upd('transaksi',[{id:newId('T',transaksi),tgl:TODAY,aid:memberId,jenis:'Setor Simpanan',ket:'Via portal',nom:n,tipe:'K'},...transaksi]);}else{const s=simpanan.find(x=>x.id===fSetor.sid);if(!s||s.saldo<n){alert('Saldo tidak cukup');return;}upd('simpanan',simpanan.map(x=>x.id===fSetor.sid?{...x,saldo:x.saldo-n}:x));upd('transaksi',[{id:newId('T',transaksi),tgl:TODAY,aid:memberId,jenis:'Tarik Simpanan',ket:'Via portal',nom:n,tipe:'D'},...transaksi]);}setMSetor(false)};
  const doAjukan=()=>{if(!fAjukan.jumlah)return;const j=+fAjukan.jumlah,t=+fAjukan.tenor;const np={id:newId('P',pinjaman),aid:memberId,jumlah:j,sisa:j,cicilan:Math.round(j/t),bunga:1.5,tenor:t,ke:0,tgl:TODAY,status:'Menunggu'};upd('pinjaman',[...pinjaman,np]);upd('transaksi',[{id:newId('T',transaksi),tgl:TODAY,aid:memberId,jenis:'Pengajuan Pinjaman',ket:'Pengajuan '+np.id,nom:j,tipe:'K'},...transaksi]);setMAjukan(false)};
  const doBayar=p=>{const sisa=Math.max(0,p.sisa-p.cicilan);upd('pinjaman',pinjaman.map(x=>x.id===p.id?{...x,sisa,ke:x.ke+1,status:sisa===0?'Lunas':'Aktif'}:x));upd('transaksi',[{id:newId('T',transaksi),tgl:TODAY,aid:memberId,jenis:'Angsuran',ket:'Cicilan '+p.id,nom:p.cicilan,tipe:'K'},...transaksi])};
  const tabs=[{id:'beranda',icon:'ti-home',l:'Beranda'},{id:'simpanan',icon:'ti-piggy-bank',l:'Simpanan'},{id:'pinjaman',icon:'ti-receipt',l:'Pinjaman'},{id:'transaksi',icon:'ti-history',l:'Riwayat'},{id:'profil',icon:'ti-user-circle',l:'Profil'}];
  function Beranda(){return <div>

/* ══════════════ LOGIN ══════════════ */
function Login({onAdmin,onMember,anggota}){
  const [tab,setTab]=useState('admin'),[pwd,setPwd]=useState(''),[selA,setSelA]=useState(anggota[0]?.id||''),[pin,setPin]=useState(''),[err,setErr]=useState('');
  const tryAdmin=()=>{if(pwd===ADMIN_PWD)onAdmin();else setErr('Password salah. Gunakan: mas2025')};
  const addPin=k=>{if(k==='⌫'){setPin(p=>p.slice(0,-1));setErr('');return}if(pin.length>=4)return;const np=pin+k;setPin(np);if(np.length===4){if(np===MEMBER_PIN)setTimeout(()=>onMember(selA),80);else{setErr('PIN salah. Gunakan: 1234');setTimeout(()=>setPin(''),300);}}};

/* ══════════════ MAIN APP ══════════════ */
function App(){
  const [screen,setScreen]=useState('loading'); // loading|setup|login|admin|member
  const [memberId,setMemberId]=useState(null);
  const [data,setData]=useState(null);
  const [fbStatus,setFbStatus]=useState('disconnected');
  const [showSetup,setShowSetup]=useState(false);

  // Load saved config on mount
  useEffect(()=>{
    const saved=localStorage.getItem('mas_fb_config');
    if(saved){
      try{
        const cfg=JSON.parse(saved);
        connectFirebase(cfg);
      }catch{loadLocal();}
    } else {
      setScreen('setup');
    }
  },[]);

  const loadLocal=()=>{
    try{const s=localStorage.getItem('mas_koperasi');setData(s?JSON.parse(s):initData());}catch{setData(initData());}
    setScreen('login');setFbStatus('error');
  };

  const connectFirebase=cfg=>{
    setFbStatus('connecting');
    initFirebase(cfg,
      newData=>{
        setData(newData);
        setScreen(s=>s==='loading'||s==='setup'?'login':s);
      },
      status=>{
        setFbStatus(status);
        if(status==='error')loadLocal();
      }
    );
  };

  const upd=(k,v)=>{
    const nd={...data,[k]:v};
    setData(nd);
    writeToFirebase(nd);
    // Fallback: also save locally
    try{localStorage.setItem('mas_koperasi',JSON.stringify(nd));}catch{}
  };

  const handleFbConnect=cfg=>{
    setShowSetup(false);
    connectFirebase(cfg);
  };

  const handleSkipSetup=()=>{
    setShowSetup(false);
    if(!data){loadLocal();}
  };

  if(screen==='loading')return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',flexDirection:'column',gap:10,color:'#666'}}><i className="ti ti-loader-2" style={{fontSize:32,animation:'spin 1s linear infinite'}}/><span>Memuat aplikasi...</span></div>;
  if(screen==='setup'||showSetup)return <FirebaseSetup onConnect={handleFbConnect} onSkip={handleSkipSetup}/>;
  if(!data)return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',flexDirection:'column',gap:10,color:'#666'}}><i className="ti ti-loader-2" style={{fontSize:32,animation:'spin 1s linear infinite'}}/><span>Menghubungkan ke database...</span></div>;

  return <>
    {screen==='login'&&<Login onAdmin={()=>setScreen('admin')} onMember={id=>{setMemberId(id);setScreen('member')}} anggota={data.anggota}/>}
    {screen==='admin'&&<AdminApp data={data} upd={upd} onLogout={()=>setScreen('login')} fbStatus={fbStatus} onOpenSetup={()=>setShowSetup(true)}/>}
    {screen==='member'&&<MemberApp data={data} upd={upd} memberId={memberId} onLogout={()=>setScreen('login')} fbStatus={fbStatus}/>}
    <InstallBanner/>
  </>;
}

const se=document.createElement('style');
se.textContent='@keyframes spin{to{transform:rotate(360deg)}}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}';
document.head.appendChild(se);
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
